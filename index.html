<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLUEOS ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #010205;
            --glass: rgba(0, 242, 255, 0.07);
        }

        /* Bloqueo total de selección y scroll no deseado */
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            /* Soporte para notch en dispositivos modernos */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Fondo Gamer Dinámico */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 0%, #0a1b33 0%, #010205 70%),
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            z-index: -1;
        }

        header {
            padding: 25px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--neon);
            text-shadow: 0 0 15px var(--neon);
        }

        .bat-info {
            font-size: 0.85rem;
            background: var(--glass);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        /* Widget de Estado */
        .hero {
            margin: 15px 20px;
            padding: 20px;
            background: var(--glass);
            border-radius: 12px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--neon);
            box-shadow: 0 0 10px var(--neon);
        }

        .time {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }

        .label {
            font-size: 0.75rem;
            color: var(--neon);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Cajón de Aplicaciones */
        #apps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            /* Ocultar scrollbar */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #apps::-webkit-scrollbar { display: none; }

        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: appEntry 0.4s cubic-bezier(0.2, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        .app:active { transform: scale(0.85); }

        .icon-box {
            width: 62px;
            height: 62px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            position: relative;
        }

        .icon-box img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        .app-name {
            font-size: 0.65rem;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ccc;
            font-weight: 500;
        }

        /* Dock Inferior */
        footer {
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .home-pill {
            width: 50px;
            height: 5px;
            background: var(--neon);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--neon);
            opacity: 0.6;
        }

        @keyframes appEntry {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <header>
        <div class="logo">BLUEOS</div>
        <div class="bat-info" id="bat">--%</div>
    </header>

    <div class="hero">
        <div class="time" id="clock">00:00</div>
        <div class="label">Gaming Core v2.5</div>
    </div>

    <main id="apps">
        <!-- Apps cargadas por el sistema -->
        <div style="grid-column: span 4; text-align: center; opacity: 0.2; margin-top: 40px;">
            ESPERANDO SEÑAL...
        </div>
    </main>

    <footer>
        <div class="home-pill" onclick="location.reload()"></div>
    </footer>

    <script>
        // Reloj y Batería nativos
        function updateUI() {
            const d = new Date();
            document.getElementById('clock').innerText = 
                String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0');
            
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('bat').innerText = Math.floor(b.level * 100) + "%";
                });
            }
        }
        setInterval(updateUI, 1000);
        updateUI();

        /**
         * FUNCIÓN PARA MEDIAN / APK BUILDER
         * Inyecta las aplicaciones instaladas.
         */
        window.setApps = function(json) {
            try {
                const apps = JSON.parse(json);
                const container = document.getElementById('apps');
                container.innerHTML = '';

                apps.forEach((app, index) => {
                    const el = document.createElement('div');
                    el.className = 'app';
                    el.style.animationDelay = (index * 0.03) + "s";
                    
                    el.onclick = () => {
                        if(window.Android) Android.launchApp(app.packageName);
                        else if(window.median) window.median.openApp({packageName: app.packageName});
                        else console.log("Abriendo: " + app.packageName);
                    };

                    el.innerHTML = `
                        <div class="icon-box">
                            <img src="${app.icon || 'https://cdn-icons-png.flaticon.com/512/25/25231.png'}" alt="icon">
                        </div>
                        <div class="app-name">${app.name}</div>
                    `;
                    container.appendChild(el);
                });
            } catch(e) { console.error("Error al procesar apps"); }
        };

        // Simulación para Desarrollo
        if (!window.Android && !window.median) {
            setTimeout(() => {
                const mocks = [
                    {name: "Free Fire", packageName: "com.dts", icon: ""},
                    {name: "WhatsApp", packageName: "com.wa", icon: ""},
                    {name: "YouTube", packageName: "com.yt", icon: ""},
                    {name: "Settings", packageName: "com.st", icon: ""},
                    {name: "Chrome", packageName: "com.ch", icon: ""},
                    {name: "Discord", packageName: "com.ds", icon: ""},
                    {name: "Camera", packageName: "com.cm", icon: ""},
                    {name: "Play Store", packageName: "com.ps", icon: ""}
                ];
                window.setApps(JSON.stringify(mocks));
            }, 1000);
        }
    </script>
</body>
</html>
