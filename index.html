<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLUEOS ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #01040a;
        }

        /* Forzado de color de fondo para evitar el negro del WebView */
        html { background-color: var(--bg); }
        
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, #0a1b33 0%, #01040a 100%),
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 55px 25px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--neon);
            text-shadow: 0 0 15px var(--neon);
        }

        .hero-panel {
            margin: 10px 20px;
            padding: 25px;
            background: rgba(0, 242, 255, 0.06);
            border-left: 4px solid var(--neon);
            backdrop-filter: blur(10px);
        }

        .clock {
            font-size: 3.8rem;
            font-weight: 700;
            line-height: 1;
        }

        #app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 100px;
        }

        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .app-icon {
            width: 64px; height: 64px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .app-icon img { width: 70%; height: 70%; object-fit: contain; }
        .app-label { font-size: 0.65rem; color: #d1d1d1; text-transform: uppercase; text-align: center; }

        footer {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .nav-pill {
            width: 55px; height: 6px;
            background: var(--neon);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--neon);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">BLUEOS</div>
        <div id="bat" style="border:1px solid var(--neon); padding:2px 8px; border-radius:4px; font-size:0.8rem;">--%</div>
    </header>

    <div class="hero-panel">
        <div class="clock" id="time">00:00</div>
        <div style="font-size:0.7rem; color:var(--neon); letter-spacing:3px; margin-top:5px;">SISTEMA ACTIVO v2.0</div>
    </div>

    <div id="app-grid">
        <!-- Apps cargadas dinámicamente -->
    </div>

    <footer>
        <div class="nav-pill" onclick="location.reload()"></div>
    </footer>

    <script>
        function updateUI() {
            const now = new Date();
            document.getElementById('time').innerText = 
                String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
            
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('bat').innerText = Math.floor(b.level * 100) + "%";
                });
            }
        }
        setInterval(updateUI, 1000); updateUI();

        // Esta función es la que llama el puente Android
        window.setApps = function(json) {
            const container = document.getElementById('app-grid');
            container.innerHTML = '';
            try {
                const apps = JSON.parse(json);
                apps.forEach(app => {
                    const div = document.createElement('div');
                    div.className = 'app-card';
                    div.onclick = () => {
                        if(window.Android) Android.launchApp(app.packageName);
                        else if(window.median) window.median.openApp({packageName: app.packageName});
                    };
                    div.innerHTML = `
                        <div class="app-icon"><img src="${app.icon || 'https://cdn-icons-png.flaticon.com/512/25/25231.png'}"></div>
                        <div class="app-label">${app.name}</div>
                    `;
                    container.appendChild(div);
                });
            } catch(e) {
                container.innerHTML = '<p style="grid-column: span 4; text-align:center; opacity:0.5;">Esperando datos del sistema...</p>';
            }
        };

        // Simulación para ver que el HTML no está negro
        if(!window.Android && !window.median) {
            window.setApps(JSON.stringify([
                {name: "Juego 1", packageName: "com.juego1"},
                {name: "Juego 2", packageName: "com.juego2"}
            ]));
        }
    </script>
</body>
</html>
