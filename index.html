<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLUEOS ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #01040a;
            --card: rgba(0, 242, 255, 0.08);
            --border: rgba(0, 242, 255, 0.2);
        }

        /* Reset Total - Previene que se filtre código como texto */
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, #0d1b33 0%, #010409 100%),
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Barra de Estado Superior */
        header {
            padding: 40px 25px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--neon);
            text-shadow: 0 0 15px var(--neon);
        }

        #bat {
            background: var(--card);
            padding: 5px 12px;
            border-radius: 15px;
            border: 1px solid var(--border);
            font-size: 0.8rem;
        }

        /* Widget Hero */
        .hero {
            margin: 10px 20px;
            padding: 25px;
            background: var(--card);
            border-left: 5px solid var(--neon);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .time {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            margin: 0;
        }

        .status {
            font-size: 0.8rem;
            color: var(--neon);
            letter-spacing: 3px;
            margin-top: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Grilla de Aplicaciones Mejorada */
        #app-drawer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-width: none;
            padding-bottom: 120px;
        }
        #app-drawer::-webkit-scrollbar { display: none; }

        .app-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: appIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .icon-shield {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: 0.2s;
        }

        .app-node:active .icon-shield {
            transform: scale(0.8);
            background: var(--card);
            box-shadow: 0 0 20px var(--neon);
        }

        .icon-shield img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        .name {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #efefef;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Dock / Barra de Navegación */
        .dock {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
        }

        .pill {
            width: 60px;
            height: 6px;
            background: var(--neon);
            border-radius: 20px;
            box-shadow: 0 0 15px var(--neon);
            opacity: 0.7;
            cursor: pointer;
        }

        @keyframes appIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">BLUEOS</div>
        <div id="bat">--%</div>
    </header>

    <div class="hero">
        <h1 class="time" id="clock">00:00</h1>
        <div class="status">SISTEMA ELITE EN LÍNEA</div>
    </div>

    <main id="app-drawer">
        <div style="grid-column: span 4; text-align: center; opacity: 0.3; margin-top: 60px;">
            INICIANDO PROTOCOLOS...
        </div>
    </main>

    <div class="dock">
        <div class="pill" onclick="location.reload()"></div>
    </div>

    <script>
        // Actualización de Reloj y Batería
        function updateStats() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
            
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('bat').innerText = Math.floor(b.level * 100) + "%";
                });
            }
        }
        setInterval(updateStats, 1000);
        updateStats();

        // Función para recibir apps (Soporte para Median y Website 2 APK)
        window.setApps = function(json) {
            try {
                const apps = JSON.parse(json);
                const container = document.getElementById('app-drawer');
                container.innerHTML = '';

                apps.forEach((app, i) => {
                    const el = document.createElement('div');
                    el.className = 'app-node';
                    el.style.animationDelay = (i * 0.03) + "s";
                    
                    el.onclick = () => {
                        if(window.Android) Android.launchApp(app.packageName);
                        else if(window.median) window.median.openApp({packageName: app.packageName});
                    };

                    el.innerHTML = `
                        <div class="icon-shield">
                            <img src="${app.icon || 'https://cdn-icons-png.flaticon.com/512/25/25231.png'}" alt="icon">
                        </div>
                        <div class="name">${app.name}</div>
                    `;
                    container.appendChild(el);
                });
            } catch(e) { console.error("Error al inyectar apps"); }
        };

        // Simulación para ver el diseño
        if (!window.Android && !window.median) {
            setTimeout(() => {
                const testData = [
                    {name: "Free Fire", packageName: "com.dts", icon: ""},
                    {name: "WhatsApp", packageName: "com.wa", icon: ""},
                    {name: "YouTube", packageName: "com.yt", icon: ""},
                    {name: "Discord", packageName: "com.ds", icon: ""},
                    {name: "Chrome", packageName: "com.ch", icon: ""},
                    {name: "Settings", packageName: "com.st", icon: ""},
                    {name: "Camera", packageName: "com.cm", icon: ""},
                    {name: "Play Store", packageName: "com.ps", icon: ""}
                ];
                window.setApps(JSON.stringify(testData));
            }, 1000);
        }
    </script>
</body>
</html>
