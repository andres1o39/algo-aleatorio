<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLUEOS GAMING</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #02040a;
            --card: rgba(0, 242, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Fondo de malla */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon);
        }

        .battery { font-size: 0.9rem; color: #fff; opacity: 0.6; }

        /* Widget de Hora Central */
        .hero {
            padding: 20px;
            margin: 10px 20px;
            background: var(--card);
            border-left: 4px solid var(--neon);
            border-radius: 4px;
        }

        .time { font-size: 3rem; font-weight: 700; margin: 0; line-height: 1; }
        .mode { font-size: 0.8rem; color: var(--neon); letter-spacing: 2px; margin-top: 5px; }

        /* Contenedor de Apps */
        #apps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.3s ease forwards;
        }

        .app:active { transform: scale(0.9); }

        .app-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .app-icon img { width: 75%; height: 75%; object-fit: contain; }

        .app-name {
            font-size: 0.65rem;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #ccc;
        }

        /* Barra Inferior (Dock) */
        .dock {
            padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: flex;
            justify-content: center;
        }

        .home-bar {
            width: 45px;
            height: 5px;
            background: var(--neon);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--neon);
            opacity: 0.7;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <header>
        <div class="logo">BLUEOS</div>
        <div class="battery" id="bat">--%</div>
    </header>

    <div class="hero">
        <h1 class="time" id="clock">00:00</h1>
        <div class="mode">GAMING CORE ACTIVE</div>
    </div>

    <main id="apps">
        <!-- Las apps se cargarán aquí desde el sistema -->
        <div style="grid-column: span 4; text-align: center; opacity: 0.3; margin-top: 50px;">
            ESPERANDO SISTEMA...
        </div>
    </main>

    <div class="dock">
        <div class="home-bar" onclick="location.reload()"></div>
    </div>

    <script>
        // Actualizar Reloj y Batería
        function sync() {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
            if(navigator.getBattery) {
                navigator.getBattery().then(b => {
                    document.getElementById('bat').innerText = Math.floor(b.level * 100) + "%";
                });
            }
        }
        setInterval(sync, 1000);
        sync();

        // FUNCIÓN CLAVE: El APK debe llamar a esta función
        window.setApps = function(json) {
            const apps = JSON.parse(json);
            const container = document.getElementById('apps');
            container.innerHTML = '';

            apps.forEach(app => {
                const item = document.createElement('div');
                item.className = 'app';
                item.onclick = () => {
                    if(window.Android) Android.launchApp(app.packageName);
                    else console.log("Abriendo: " + app.packageName);
                };

                item.innerHTML = `
                    <div class="app-icon">
                        <img src="${app.icon || 'https://cdn-icons-png.flaticon.com/512/25/25231.png'}">
                    </div>
                    <div class="app-name">${app.name}</div>
                `;
                container.appendChild(item);
            });
        };

        // Simulación para prueba en navegador
        if(!window.Android) {
            setTimeout(() => {
                setApps(JSON.stringify([
                    {name: "Free Fire", packageName: "com.dts", icon: ""},
                    {name: "WhatsApp", packageName: "com.wa", icon: ""},
                    {name: "YouTube", packageName: "com.yt", icon: ""},
                    {name: "Chrome", packageName: "com.ch", icon: ""}
                ]));
            }, 1000);
        }
    </script>
</body>
</html>
