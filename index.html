<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLUEOS ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #01040a;
        }

        /* Forzamos que el cuerpo siempre tenga color para evitar pantalla negra */
        html, body {
            background-color: #01040a !important;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
            color: white;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-image: radial-gradient(circle at 50% 50%, #0a1b33 0%, #01040a 100%);
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 50px 25px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon);
            letter-spacing: 5px;
        }

        .hero {
            margin: 20px;
            padding: 30px;
            background: rgba(0, 242, 255, 0.05);
            border-left: 4px solid var(--neon);
            backdrop-filter: blur(10px);
        }

        .time {
            font-size: 4rem;
            font-weight: 700;
        }

        #apps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,242,255,0.2);
            border-radius: 15px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon img { width: 70%; height: 70%; }
        .name { font-size: 0.7rem; color: #ccc; text-transform: uppercase; }

        footer {
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pill {
            width: 50px; height: 4px;
            background: var(--neon);
            box-shadow: 0 0 10px var(--neon);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">BLUEOS</div>
        <div id="bat">100%</div>
    </header>

    <div class="hero">
        <div class="time" id="clock">00:00</div>
        <div style="font-size: 0.8rem; color: var(--neon); letter-spacing: 2px;">SISTEMA CARGADO</div>
    </div>

    <div id="apps">
        <!-- Apps se inyectan aquí -->
    </div>

    <footer>
        <div class="pill" onclick="location.reload()"></div>
    </footer>

    <script>
        function update() {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
        }
        setInterval(update, 1000); update();

        window.setApps = function(json) {
            const container = document.getElementById('apps');
            container.innerHTML = '';
            const apps = JSON.parse(json);
            apps.forEach(app => {
                const div = document.createElement('div');
                div.className = 'app';
                div.onclick = () => {
                    if(window.median) window.median.openApp({packageName: app.packageName});
                    else if(window.Android) Android.launchApp(app.packageName);
                };
                div.innerHTML = `<div class="icon"><img src="${app.icon || 'https://cdn-icons-png.flaticon.com/512/25/25231.png'}"></div><div class="name">${app.name}</div>`;
                container.appendChild(div);
            });
        };

        // Datos de prueba para verificar que no esté en negro
        if(!window.median && !window.Android) {
            window.setApps(JSON.stringify([{name: "Test App", packageName: "com.test"}]));
        }
    </script>
</body>
</html>
